<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fábrica — By Nina</title>
<style>
  :root {
    --bg:#f7f5f2;--surface:#fff;--surface2:#f0ede9;--border:#e2ddd8;--border2:#ccc8c2;
    --text:#1a1714;--text2:#6b6560;--text3:#a09890;
    --accent:#2d6a4f;--accent-bg:#e8f4ef;
    --danger:#991b1b;--danger-bg:#fee2e2;
    --warn-bg:#fef3c7;--warn-text:#92400e;
    --green-bg:#dcfce7;--green-text:#166534;
    --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .login-card{background:var(--surface);border-radius:16px;padding:40px 32px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.1);text-align:center}
  .login-logo{font-size:13px;font-weight:700;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
  .login-title{font-size:22px;font-weight:700;margin-bottom:4px}
  .login-sub{font-size:13px;color:var(--text2);margin-bottom:32px}
  .user-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;margin-bottom:10px;transition:all .15s;text-align:left}
  .user-btn:hover{border-color:var(--accent);background:var(--accent-bg)}
  .user-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
  .uname{font-size:14px;font-weight:600}.urole{font-size:11px;color:var(--text2)}

  #app{display:none}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .topbar-left{display:flex;align-items:center;gap:8px}
  .topbar-logo{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase}
  .topbar-title{font-size:15px;font-weight:600}
  .user-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:var(--surface2);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer}
  .notif-btn{position:relative;width:34px;height:34px;border-radius:50%;border:none;background:var(--surface2);cursor:pointer;font-size:16px;margin-right:6px}
  .notif-badge{position:absolute;top:2px;right:2px;min-width:16px;height:16px;border-radius:8px;background:var(--danger);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px}

  .main{max-width:720px;margin:0 auto;padding:16px}
  .tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface2);border-radius:var(--radius);padding:3px}
  .tab{flex:1;padding:7px;border-radius:8px;border:none;background:transparent;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer}
  .tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow);font-weight:600}

  .section{margin-bottom:14px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  .sec-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer}
  .sec-left{display:flex;align-items:center;gap:8px}
  .sec-title{font-size:13px;font-weight:600}
  .sec-count{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;background:rgba(255,255,255,.25)}
  .sec-body{border-top:1px solid rgba(0,0,0,.07)}
  .sec-add{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--border);background:var(--surface)}
  .sec-add input{flex:1;font-size:12px;border:1px solid var(--border);border-radius:6px;padding:6px 10px;background:var(--bg);color:var(--text)}
  .sec-add input:focus{outline:none;border-color:var(--accent)}
  .sec-add button{font-size:12px;padding:6px 10px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer}

  .item{background:var(--surface);padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px}
  .item:last-of-type{border-bottom:none}
  .item-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;transition:all .15s}
  .item-check.checked{background:var(--accent);border-color:var(--accent)}
  .item-body{flex:1;min-width:0}
  .item-code{font-size:13px;font-weight:600}
  .item-name{font-size:12px;color:var(--text2);margin-top:1px}
  .item-sub{font-size:11px;color:var(--text3);margin-top:1px;font-style:italic}
  .item.done .item-code,.item.done .item-name{text-decoration:line-through;color:var(--text3)}
  .item-actions{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;align-items:center}

  .etapa-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;margin-top:4px}

  /* CORTADA PANEL */
  .cortada-panel{margin-top:8px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);overflow:hidden}
  .cortada-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border)}
  .cortada-row:last-child{border-bottom:none}
  .c-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all .15s}
  .c-check.checked{background:var(--accent);border-color:var(--accent)}
  .c-check.disabled{cursor:default;opacity:.4}
  .c-label{font-size:12px;color:var(--text2);flex:1}
  .c-label.done{text-decoration:line-through;color:var(--text3)}

  /* AVÍOS dentro de panel cortada */
  .avios-panel{margin-top:0;display:flex;flex-direction:column}
  .avio-item{display:flex;align-items:center;gap:8px;padding:7px 12px 7px 28px;border-top:1px solid var(--border);flex-wrap:wrap}
  .avio-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .avio-name{font-size:11px;color:var(--text2);flex:1}
  .avio-badge{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
  .avio-actions{display:flex;gap:4px}
  .avio-state-btn{font-size:10px;padding:2px 7px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap}
  .avio-state-btn:hover{background:var(--surface)}

  /* AVÍOS normales (secciones no muestra) */
  .avios{margin-top:7px;display:flex;flex-direction:column;gap:4px}
  .avio-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .avio-prov{font-size:10px;color:var(--text3)}

  .btn-sm{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
  .btn-sm:hover{background:var(--surface2)}
  .btn-danger{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--danger);background:transparent;color:var(--danger);cursor:pointer}
  .btn-advance{font-size:11px;padding:4px 10px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:600}
  .move-select{font-size:11px;border:1px solid var(--border2);border-radius:6px;padding:3px 6px;background:var(--bg);color:var(--text);cursor:pointer}

  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
  .stat-card{background:var(--surface);border-radius:var(--radius);padding:10px 12px;text-align:center;box-shadow:var(--shadow)}
  .stat-num{font-size:22px;font-weight:700}.stat-label{font-size:10px;color:var(--text3);margin-top:2px}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
  .modal{background:var(--surface);border-radius:14px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
  .modal-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-size:15px;font-weight:700}
  .modal-close{font-size:22px;background:none;border:none;cursor:pointer;color:var(--text2);line-height:1}
  .modal-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px}
  .modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
  .field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
  .field input,.field select{width:100%;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg);color:var(--text)}
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
  .btn-primary{padding:9px 18px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
  .btn-secondary{padding:9px 18px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;cursor:pointer}
  .avio-block{background:var(--bg);border-radius:8px;padding:10px;margin-bottom:8px;display:flex;flex-direction:column;gap:8px}

  .notif-panel{position:fixed;top:52px;right:8px;width:320px;max-height:70vh;background:var(--surface);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.15);border:1px solid var(--border);z-index:150;overflow:hidden;display:flex;flex-direction:column}
  .notif-panel-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .notif-list{overflow-y:auto;flex:1}
  .notif-item{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px}
  .notif-item.unread{background:var(--accent-bg)}
  .notif-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
  .notif-dot.read{background:var(--border2)}
  .notif-text{font-size:12px;flex:1;line-height:1.4}
  .notif-time{font-size:10px;color:var(--text3);margin-top:2px}
  .notif-read-btn{font-size:10px;color:var(--accent);background:none;border:none;cursor:pointer;white-space:nowrap}
  .mark-all-btn{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:500}
  .empty-state{padding:32px;text-align:center;color:var(--text3);font-size:13px}
  .add-sec-btn{width:100%;padding:10px;font-size:13px;border-radius:var(--radius);border:1.5px dashed var(--border2);background:transparent;color:var(--text2);cursor:pointer;margin-top:4px}
  .hidden{display:none!important}
  .loading{text-align:center;padding:40px;color:var(--text3);font-size:14px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1714;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1}

  .radio-group{display:flex;gap:8px;margin-top:4px}
  .radio-btn{flex:1;padding:7px;border-radius:8px;border:1.5px solid var(--border);background:transparent;font-size:12px;cursor:pointer;text-align:center;color:var(--text2);transition:all .15s}
  .radio-btn.selected{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);font-weight:600}
</style>
</head>

<div class="toast" id="toast"></div>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">By Nina</div>
    <div class="login-title">Fábrica</div>
    <div class="login-sub">¿Quién sos?</div>
    <button class="user-btn" id="btn-ariel"><div class="user-avatar" style="background:#2d6a4f">A</div><div><div class="uname">Ariel</div><div class="urole">Administrador — acceso total</div></div></button>
    <button class="user-btn" id="btn-peque"><div class="user-avatar" style="background:#5b21b6">P</div><div><div class="uname">Peque</div><div class="urole">Fábrica — acciones registradas</div></div></button>
    <button class="user-btn" id="btn-emir"><div class="user-avatar" style="background:#b45309">E</div><div><div class="uname">Emir</div><div class="urole">Depósito — recepción de avíos</div></div></button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left"><span class="topbar-logo">By Nina</span><span class="topbar-title">· Fábrica</span></div>
    <div style="display:flex;align-items:center">
      <button class="notif-btn hidden" id="notif-btn">🔔<span class="notif-badge hidden" id="notif-badge">0</span></button>
      <div class="user-chip" id="user-chip">— <span style="opacity:.4">salir</span></div>
    </div>
  </div>

  <div class="notif-panel hidden" id="notif-panel">
    <div class="notif-panel-header"><span style="font-size:13px;font-weight:700">Actividad de Peque</span><button class="mark-all-btn" id="mark-all-btn">Marcar todo leído</button></div>
    <div class="notif-list" id="notif-list"></div>
  </div>

  <div class="main">
    <div class="tabs">
      <button class="tab active" id="tab-btn-tablero">Tablero</button>
      <button class="tab" id="tab-btn-actividad">Actividad</button>
    </div>
    <div id="tab-tablero">
      <div class="stats-bar" id="stats-bar"></div>
      <div id="sections-container"><div class="loading">Conectando...</div></div>
      <button class="add-sec-btn hidden" id="add-sec-btn">+ Nueva sección</button>
    </div>
    <div id="tab-actividad" class="hidden"><div id="actividad-list"><div class="loading">Cargando...</div></div></div>
  </div>
</div>

<!-- Modal editar ítem -->
<div class="modal-overlay hidden" id="modal-edit">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Editar ítem</span><button class="modal-close" id="close-modal-edit">×</button></div>
    <div class="modal-body" id="modal-edit-body"></div>
    <div class="modal-footer"><button class="btn-secondary" id="cancel-modal-edit">Cancelar</button><button class="btn-primary" id="save-modal-edit">Guardar</button></div>
  </div>
</div>

<!-- Modal nueva sección -->
<div class="modal-overlay hidden" id="modal-sec">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Nueva sección</span><button class="modal-close" id="close-modal-sec">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Nombre</label><input type="text" id="new-sec-name" placeholder="Ej: Muestras en revisión"></div>
      <div class="field"><label>Color</label><select id="new-sec-color"><option value="purple">Violeta</option><option value="warn">Naranja</option><option value="danger">Rojo</option><option value="accent">Verde claro</option><option value="green">Verde oscuro</option></select></div>
    </div>
    <div class="modal-footer"><button class="btn-secondary" id="cancel-modal-sec">Cancelar</button><button class="btn-primary" id="save-modal-sec">Crear</button></div>
  </div>
</div>

    i7:{code:'Corte 94',name:'4752 · Top con Puntilla con Cuello',sub:'',done:false,avios:{a1:{nombre:'Encaje Elastizado',proveedor:'Button Company',fecha_pedido:'8/6/2026',recibido:false}}},
    i8:{code:'Corte 97',name:'1163 · Pantalon Pinzas Clasico',sub:'',done:false,avios:{a1:{nombre:'Botón Yarda a tono',proveedor:'Walter Botonera Union',fecha_pedido:'18/6/2026',recibido:false},a2:{nombre:'Cierre 14cm',proveedor:'Walter Botonera Union',fecha_pedido:'18/6/2026',recibido:false}}},

};

let currentUser=null,sectionsData={},actividadData={};
let editCtx={secId:null,itemId:null,newAvioCount:0};

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// LOGIN
document.getElementById('btn-ariel').onclick=()=>doLogin('ariel');
document.getElementById('btn-peque').onclick=()=>doLogin('peque');
document.getElementById('btn-emir').onclick=()=>doLogin('emir');
document.getElementById('user-chip').onclick=doLogout;

function doLogin(user){
  currentUser=user;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-chip').innerHTML=user.charAt(0).toUpperCase()+user.slice(1)+' <span style="opacity:.4">salir</span>';
  if(user==='ariel'){
    document.getElementById('notif-btn').classList.remove('hidden');
    document.getElementById('add-sec-btn').classList.remove('hidden');
  }
  startListening();
}
function doLogout(){
  currentUser=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('notif-btn').classList.add('hidden');
  document.getElementById('add-sec-btn').classList.add('hidden');
}

function startListening(){
  db.ref('fabrica_v4').once('value',snap=>{
    if(!snap.val()) db.ref('fabrica_v4/sections').set(INITIAL);
  });
  db.ref('fabrica_v4/sections').on('value',snap=>{
    sectionsData=snap.val()||{};
    renderSections();renderStats();
  });
  db.ref('fabrica_v4/actividad').on('value',snap=>{
    actividadData=snap.val()||{};
    renderNotifBadge();renderNotifPanel();
    if(!document.getElementById('tab-actividad').classList.contains('hidden')) renderActividad();
  });
}

function logActivity(action,details){
  if(currentUser!=='peque') return;
  db.ref('fabrica_v4/actividad').push({user:'Peque',action,details,timestamp:Date.now(),read:false});
}

function checkAutoAvance(secId,itemId,ficha,lleva_avios,avios){
  // Solo avanza si está en Cortada
  const item=sectionsData[secId]?.items?.[itemId];
  if(!item||item.etapa!=='Cortada') return;
  if(!ficha) return;
  // Si no lleva avíos, avanza directo
  if(lleva_avios===false){
    setTimeout(()=>{
      db.ref(`fabrica_v4/sections/${secId}/items/${itemId}/etapa`).set('Sacar a taller');
      logActivity('Auto → Sacar a taller',item.code);
      showToast('🎉 ¡Lista para sacar a taller!');
    },400);
    return;
  }
  // Si lleva avíos, verificar que todos estén recibidos
  if(lleva_avios===true){
    const avList=Object.values(avios||{});
    if(avList.length>0 && avList.every(a=>a.recibido)){
      setTimeout(()=>{
        db.ref(`fabrica_v4/sections/${secId}/items/${itemId}/etapa`).set('Sacar a taller');
        logActivity('Auto → Sacar a taller',item.code);
        showToast('🎉 ¡Lista para sacar a taller!');
      },400);
    }
  }
}

function renderStats(){
  let total=0,done=0,bloq=0,sinPedir=0;
  Object.values(sectionsData).forEach(sec=>{
    Object.values(sec.items||{}).forEach(item=>{
      total++;if(item.done)done++;
      if((sec.title||'').toLowerCase().includes('bloqueado'))bloq++;
      if(Object.values(item.avios||{}).some(a=>!a.fecha_pedido&&!a.recibido))sinPedir++;
    });
  });
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-card"><div class="stat-num">${total-done}</div><div class="stat-label">Pendientes</div></div>
    <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-label">Listos</div></div>
    <div class="stat-card"><div class="stat-num">${bloq}</div><div class="stat-label">Bloqueados</div></div>
    <div class="stat-card"><div class="stat-num">${sinPedir}</div><div class="stat-label">Avíos sin pedir</div></div>`;
}

function renderSections(){
  const c=document.getElementById('sections-container');c.innerHTML='';
  Object.entries(sectionsData).sort((a,b)=>(a[1].order||0)-(b[1].order||0)).forEach(([secId,sec])=>{
    const col=COLORS[sec.color]||COLORS.accent;
    const items=Object.entries(sec.items||{});
    const pending=items.filter(([,i])=>!i.done).length;
    const div=document.createElement('div');div.className='section';
    const hBtns=currentUser==='ariel'?`
      <button onclick="editSecTitle('${secId}')" style="background:rgba(255,255,255,.2);border:none;border-radius:6px;padding:3px 7px;color:#fff;cursor:pointer;font-size:11px">✏️</button>
      <button onclick="deleteSec('${secId}')" style="background:rgba(255,255,255,.2);border:none;border-radius:6px;padding:3px 7px;color:#fff;cursor:pointer;font-size:11px">🗑</button>`:'';
    const addRow=(currentUser==='ariel'||currentUser==='peque')?`<div class="sec-add"><input type="text" placeholder="Código / nombre..." id="qa-${secId}"><button onclick="quickAdd('${secId}')">+ Agregar</button></div>`:'';
    div.innerHTML=`
      <div class="sec-header" style="background:${col.secBg}" onclick="toggleSec('${secId}')">
        <div class="sec-left"><span class="sec-title" style="color:${col.secText}">${sec.title}</span><span class="sec-count" style="color:${col.secText}">${pending}</span></div>
        <div style="display:flex;gap:6px;align-items:center" onclick="event.stopPropagation()">${hBtns}<span style="color:${col.secText};font-size:12px">${sec.collapsed?'▶':'▼'}</span></div>
      </div>
      <div class="sec-body ${sec.collapsed?'hidden':''}" id="body-${secId}">
        ${items.map(([itemId,item])=>buildItem(secId,itemId,item,sec)).join('')}
        ${addRow}
      </div>`;
    c.appendChild(div);
  });
}

function buildItem(secId,itemId,item,sec){
  const canEdit=currentUser==='ariel'||currentUser==='peque';
  const esMuestra=sec.tipo==='muestra';
  const etapa=item.etapa||'Pendiente corte';
  const ec=ETAPA_COLORS[etapa]||{bg:'#f0ede9',text:'#6b6560'};

  let etapaHtml='';
  if(esMuestra) etapaHtml=`<span class="etapa-badge" style="background:${ec.bg};color:${ec.text}">● ${etapa}</span>`;

  // Panel cortada
  let cortadaPanel='';
  if(esMuestra && etapa==='Cortada'){
    const canCheck=currentUser==='ariel'||currentUser==='peque'||currentUser==='emir';
    const fichaOk=item.ficha||false;
    const llevaAvios=item.lleva_avios; // null=sin definir, true=sí, false=no
    const avios=Object.entries(item.avios||{});

    // Ficha row
    let fichaRow=`<div class="cortada-row">
      <div class="c-check ${fichaOk?'checked':''} ${!canCheck?'disabled':''}" onclick="${canCheck?`toggleFicha('${secId}','${itemId}')`:''}">
        ${fichaOk?'✓':''}
      </div>
      <span class="c-label ${fichaOk?'done':''}">Ficha Producto lista</span>
    </div>`;

    // Lleva avíos row
    let llevaAviosRow='';
    if(canCheck){
      llevaAviosRow=`<div class="cortada-row">
        <span class="c-label" style="color:var(--text2);font-weight:500">¿Lleva avíos?</span>
        <div class="radio-group" style="flex:none">
          <button class="radio-btn ${llevaAvios===true?'selected':''}" onclick="setLlevaAvios('${secId}','${itemId}',true)">Sí</button>
          <button class="radio-btn ${llevaAvios===false?'selected':''}" onclick="setLlevaAvios('${secId}','${itemId}',false)">No</button>
        </div>
      </div>`;
    } else {
      const label=llevaAvios===true?'Sí lleva avíos':llevaAvios===false?'Sin avíos':'Sin definir';
      llevaAviosRow=`<div class="cortada-row"><span class="c-label">${label}</span></div>`;
    }

    // Avíos list (si lleva)
    let aviosListHtml='';
    if(llevaAvios===true){
      aviosListHtml='<div class="avios-panel">';
      if(avios.length===0){
        aviosListHtml+=`<div class="avio-item"><span style="font-size:12px;color:var(--text3);font-style:italic">Sin avíos cargados</span>
          ${canEdit?`<button class="btn-sm" onclick="openEditModal('${secId}','${itemId}')">+ Cargar avíos</button>`:''}
        </div>`;
      } else {
        aviosListHtml+=avios.map(([avioId,avio])=>{
          const rec=avio.recibido;
          const hasDate=!!avio.fecha_pedido;
          const dotColor=rec?'#16a34a':hasDate?'#d97706':'#dc2626';
          const badge=rec
            ?`<span class="avio-badge" style="background:#dcfce7;color:#166534">✓ Entregado</span>`
            :hasDate
              ?`<span class="avio-badge" style="background:#fef3c7;color:#92400e">Pedido ${avio.fecha_pedido}</span>`
              :`<span class="avio-badge" style="background:#fee2e2;color:#991b1b">Sin pedir</span>`;
          const btns=canCheck?`<div class="avio-actions">
            ${!rec?`<button class="avio-state-btn" onclick="marcarRecibido('${secId}','${itemId}','${avioId}')">✓ Entregado</button>`
              :`<button class="avio-state-btn" onclick="desmarcarRecibido('${secId}','${itemId}','${avioId}')">↩ Deshacer</button>`}
          </div>`:'';
          return `<div class="avio-item">
            <div class="avio-dot" style="background:${dotColor}"></div>
            <span class="avio-name">${avio.nombre}${avio.proveedor?` <span style="color:var(--text3);font-size:10px">· ${avio.proveedor}</span>`:''}</span>
            ${badge}${btns}
          </div>`;
        }).join('');
        if(canEdit) aviosListHtml+=`<div class="avio-item"><button class="btn-sm" onclick="openEditModal('${secId}','${itemId}')">✏️ Editar avíos</button></div>`;
      }
      aviosListHtml+='</div>';
    }

    cortadaPanel=`<div class="cortada-panel">${fichaRow}${llevaAviosRow}${aviosListHtml}</div>`;
  }

  // Avíos normales (secciones no muestra)
  let aviosHtml='';
  if(!esMuestra){
    const avios=Object.entries(item.avios||{});
    if(avios.length){
      aviosHtml='<div class="avios">'+avios.map(([avioId,avio])=>{
        const rec=avio.recibido;
        const hasDate=!!avio.fecha_pedido;
        const dotColor=rec?'#16a34a':hasDate?'#d97706':'#dc2626';
        const badge=rec
          ?`<span class="avio-badge" style="background:#dcfce7;color:#166534">✓ Recibido</span>`
          :hasDate
            ?`<span class="avio-badge" style="background:#fef3c7;color:#92400e">Pedido ${avio.fecha_pedido}</span>`
            :`<span class="avio-badge" style="background:#fee2e2;color:#991b1b">Sin pedir</span>`;
        const recBtn=!rec&&(currentUser==='emir'||currentUser==='ariel'||currentUser==='peque')
          ?`<button class="avio-state-btn" onclick="marcarRecibido('${secId}','${itemId}','${avioId}')">Marcar recibido</button>`:'';
        const unrecBtn=rec&&(currentUser==='ariel'||currentUser==='peque')
          ?`<button class="avio-state-btn" onclick="desmarcarRecibido('${secId}','${itemId}','${avioId}')">↩ Deshacer</button>`:'';
        return `<div class="avio-row">
          <div class="avio-dot" style="background:${dotColor}"></div>
          <span class="avio-name" style="font-size:11px;color:var(--text2)">${avio.nombre}</span>
          ${avio.proveedor?`<span class="avio-prov">· ${avio.proveedor}</span>`:''}
          ${badge}${recBtn}${unrecBtn}
        </div>`;
      }).join('')+'</div>';
    }
  }

  // Botón avanzar/retroceder etapa (muestras)
  let etapaBtns='';
  if(esMuestra && canEdit){
    const idx=ETAPAS.indexOf(etapa);
    if(idx<ETAPAS.length-1) etapaBtns+=`<button class="btn-advance" onclick="avanzarEtapa('${secId}','${itemId}')">→ ${ETAPAS[idx+1]}</button>`;
    if(idx>0) etapaBtns+=` <button class="btn-sm" onclick="retrocederEtapa('${secId}','${itemId}')">↩ Volver</button>`;
  }

  // Mover a — solo destinos lógicos
  let moveHtml='';
  if(canEdit){
    const destinos=(FLUJO[secId]||[]).filter(id=>sectionsData[id]);
    // Si no hay flujo definido, mostrar todas las secciones (para secciones nuevas)
    const targets=destinos.length>0 ? destinos : Object.keys(sectionsData).filter(id=>id!==secId);
    if(targets.length){
      const opts=targets.map(id=>`<option value="${id}">${sectionsData[id].title}</option>`).join('');
      moveHtml=`<select class="move-select" onchange="moveItem('${secId}','${itemId}',this.value);this.value=''"><option value="">Mover a...</option>${opts}</select>`;
    }
  }

  const canToggle=currentUser==='ariel'||currentUser==='peque';
  const actions=`<div class="item-actions">
    ${etapaBtns}
    ${canEdit?`<button class="btn-sm" onclick="openEditModal('${secId}','${itemId}')">✏️ Editar</button>`:''}
    ${moveHtml}
    ${currentUser==='ariel'?`<button class="btn-danger" onclick="deleteItem('${secId}','${itemId}')">Eliminar</button>`:''}
  </div>`;

  return `<div class="item ${item.done?'done':''}">
    <div class="item-check ${item.done?'checked':''}" style="cursor:${canToggle?'pointer':'default'}" onclick="${canToggle?`toggleItem('${secId}','${itemId}')`:''}">${item.done?'✓':''}</div>
    <div class="item-body">
      <div class="item-code">${item.code}</div>
      ${item.name?`<div class="item-name">${item.name}</div>`:''}
      ${item.sub?`<div class="item-sub">${item.sub}</div>`:''}
      ${etapaHtml}${cortadaPanel}${aviosHtml}${actions}
    </div>
  </div>`;
}

// ACTIONS
function toggleSec(secId){db.ref(`fabrica_v4/sections/${secId}/collapsed`).set(!(sectionsData[secId].collapsed||false))}
function toggleItem(secId,itemId){
  const item=sectionsData[secId].items[itemId];
  const nv=!item.done;
  db.ref(`fabrica_v4/sections/${secId}/items/${itemId}/done`).set(nv);
  logActivity(nv?'Marcó listo':'Desmarcó',`${item.code} ${item.name||''}`);
  showToast(nv?'✓ Marcado como listo':'Desmarcado');
}

function toggleFicha(secId,itemId){
  const item=sectionsData[secId].items[itemId];
  const nv=!(item.ficha||false);
  db.ref(`fabrica_v4/sections/${secId}/items/${itemId}/ficha`).set(nv);
  logActivity(`Ficha Producto ${nv?'✓':'✗'}`,item.code);
  showToast(nv?'✓ Ficha marcada':'Ficha desmarcada');
  // Check auto avance
  checkAutoAvance(secId,itemId,nv,item.lleva_avios,item.avios);
}

function setLlevaAvios(secId,itemId,val){
  const item=sectionsData[secId].items[itemId];
  db.ref(`fabrica_v4/sections/${secId}/items/${itemId}/lleva_avios`).set(val);
  logActivity(`Lleva avíos: ${val?'Sí':'No'}`,item.code);
  showToast(val?'Lleva avíos: Sí':'Sin avíos requeridos');
  // Si no lleva avíos y ficha ok → auto avance
  if(!val && (item.ficha||false)){
    checkAutoAvance(secId,itemId,item.ficha,val,item.avios);
  }
}

function marcarRecibido(secId,itemId,avioId){
  const item=sectionsData[secId].items[itemId];
  const avio=item.avios[avioId];
  db.ref(`fabrica_v4/sections/${secId}/items/${itemId}/avios/${avioId}/recibido`).set(true);
  logActivity('Avío recibido',`${avio.nombre} — ${item.code}`);
  showToast('✓ Avío marcado como recibido');
  // Check auto avance con el nuevo estado
  const aviosActualizados={...item.avios,[avioId]:{...avio,recibido:true}};
  checkAutoAvance(secId,itemId,item.ficha||false,item.lleva_avios,aviosActualizados);
}

function desmarcarRecibido(secId,itemId,avioId){
  const item=sectionsData[secId].items[itemId];
  const avio=item.avios[avioId];
  db.ref(`fabrica_v4/sections/${secId}/items/${itemId}/avios/${avioId}/recibido`).set(false);
  logActivity('Deshizo avío recibido',`${avio.nombre} — ${item.code}`);
  showToast('↩ Avío desmarcado');
}

function checkAutoAvance(secId,itemId,ficha,llevaAvios,avios){
  const item=sectionsData[secId]?.items?.[itemId];
  if(!item||item.etapa!=='Cortada') return;
  if(!ficha) return;
  if(llevaAvios===false){
    setTimeout(()=>{
      db.ref(`fabrica_v4/sections/${secId}/items/${itemId}/etapa`).set('Sacar a taller');
      logActivity('Auto → Sacar a taller',item.code);
      showToast('🎉 ¡Lista para sacar a taller!');
    },400);
    return;
  }
  if(llevaAvios===true){
    const avList=Object.values(avios||{});
    if(avList.length>0&&avList.every(a=>a.recibido)){
      setTimeout(()=>{
        db.ref(`fabrica_v4/sections/${secId}/items/${itemId}/etapa`).set('Sacar a taller');
        logActivity('Auto → Sacar a taller',item.code);
        showToast('🎉 ¡Lista para sacar a taller!');
      },400);
    }
  }
}

function avanzarEtapa(secId,itemId){
  const item=sectionsData[secId].items[itemId];
  const idx=ETAPAS.indexOf(item.etapa||'Pendiente corte');
  if(idx<ETAPAS.length-1){
    const nv=ETAPAS[idx+1];
    db.ref(`fabrica_v4/sections/${secId}/items/${itemId}/etapa`).set(nv);
    logActivity('Avanzó etapa',`${item.code} → ${nv}`);
    showToast(`→ ${nv}`);
  }
}

function retrocederEtapa(secId,itemId){
  const item=sectionsData[secId].items[itemId];
  const idx=ETAPAS.indexOf(item.etapa||'Pendiente corte');
  if(idx>0){
    const nv=ETAPAS[idx-1];
    db.ref(`fabrica_v4/sections/${secId}/items/${itemId}/etapa`).set(nv);
    logActivity('Retrocedió etapa',`${item.code} → ${nv}`);
    showToast(`↩ Volvió a ${nv}`);
  }
}

function quickAdd(secId){
  const inp=document.getElementById(`qa-${secId}`);
  const val=(inp.value||'').trim();if(!val)return;
  const sec=sectionsData[secId];
  const ni={code:val,name:'',sub:'',done:false,avios:{}};
  if(sec.tipo==='muestra'){ni.etapa='Pendiente corte';ni.ficha=false;ni.lleva_avios=null;}
  db.ref(`fabrica_v4/sections/${secId}/items`).push(ni);
  logActivity('Agregó ítem',val);inp.value='';showToast('Ítem agregado');
}

function moveItem(secId,itemId,targetSecId){
  if(!targetSecId)return;
  const item=sectionsData[secId].items[itemId];
  db.ref(`fabrica_v4/sections/${targetSecId}/items`).push(item);
  db.ref(`fabrica_v4/sections/${secId}/items/${itemId}`).remove();
  logActivity('Movió ítem',`${item.code} → ${sectionsData[targetSecId].title}`);
  showToast('Ítem movido');
}

function deleteItem(secId,itemId){
  if(!confirm('¿Eliminar este ítem?'))return;
  db.ref(`fabrica_v4/sections/${secId}/items/${itemId}`).remove();
  showToast('Ítem eliminado');
}

function deleteSec(secId){
  if(!confirm('¿Eliminar esta sección y todos sus ítems?'))return;
  db.ref(`fabrica_v4/sections/${secId}`).remove();
}

function editSecTitle(secId){
  const name=prompt('Nombre de la sección:',sectionsData[secId].title);
  if(name&&name.trim()) db.ref(`fabrica_v4/sections/${secId}/title`).set(name.trim());
}

// EDIT MODAL
function openEditModal(secId,itemId){
  editCtx={secId,itemId,newAvioCount:0};
  const item=sectionsData[secId].items[itemId];
  const avios=Object.entries(item.avios||{});
  document.getElementById('modal-edit-body').innerHTML=`
    <div class="field"><label>Código</label><input type="text" id="e-code" value="${item.code||''}"></div>
    <div class="field"><label>Nombre artículo</label><input type="text" id="e-name" value="${item.name||''}"></div>
    <div class="field"><label>Nota / estado</label><input type="text" id="e-sub" value="${item.sub||''}"></div>
    <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:4px">Avíos</div>
    <div id="avios-edit">
      ${avios.map(([avioId,avio])=>`<div class="avio-block">
        <div class="field"><label>Avío</label><input type="text" id="an-${avioId}" value="${avio.nombre||''}"></div>
        <div class="field"><label>Proveedor</label><input type="text" id="ap-${avioId}" value="${avio.proveedor||''}"></div>
        <div class="field"><label>Fecha pedido</label><input type="text" id="af-${avioId}" value="${avio.fecha_pedido||''}"></div>
        ${currentUser==='ariel'?`<button class="btn-danger" style="margin-top:4px;width:100%" onclick="deleteAvio('${secId}','${itemId}','${avioId}')">Eliminar avío</button>`:''}
      </div>`).join('')}
    </div>
    <button class="btn-sm" onclick="addAvioField()" style="width:100%;padding:8px">+ Agregar avío</button>`;
  document.getElementById('modal-edit').classList.remove('hidden');
}

function addAvioField(){
  editCtx.newAvioCount++;
  const n=`new${editCtx.newAvioCount}`;
  const d=document.createElement('div');d.className='avio-block';
  d.innerHTML=`
    <div class="field"><label>Avío</label><input type="text" id="an-${n}" placeholder="Ej: Botón Jeanero"></div>
    <div class="field"><label>Proveedor</label><input type="text" id="ap-${n}" placeholder="Ej: Button Company"></div>
    <div class="field"><label>Fecha pedido</label><input type="text" id="af-${n}" placeholder="Ej: 8/6/2026"></div>`;
  document.getElementById('avios-edit').appendChild(d);
}

function saveEditItem(){
  const{secId,itemId,newAvioCount}=editCtx;
  const item=sectionsData[secId].items[itemId];
  db.ref(`fabrica_v4/sections/${secId}/items/${itemId}`).update({
    code:document.getElementById('e-code').value.trim(),
    name:document.getElementById('e-name').value.trim(),
    sub:document.getElementById('e-sub').value.trim(),
  });
  Object.keys(item.avios||{}).forEach(avioId=>{
    const n=document.getElementById(`an-${avioId}`);
    if(n) db.ref(`fabrica_v4/sections/${secId}/items/${itemId}/avios/${avioId}`).update({
      nombre:n.value.trim(),
      proveedor:(document.getElementById(`ap-${avioId}`)?.value||'').trim(),
      fecha_pedido:(document.getElementById(`af-${avioId}`)?.value||'').trim(),
    });
  });
  for(let i=1;i<=newAvioCount;i++){
    const n=document.getElementById(`an-new${i}`);
    if(n&&n.value.trim()) db.ref(`fabrica_v4/sections/${secId}/items/${itemId}/avios`).push({
      nombre:n.value.trim(),
      proveedor:(document.getElementById(`ap-new${i}`)?.value||'').trim(),
      fecha_pedido:(document.getElementById(`af-new${i}`)?.value||'').trim(),
      recibido:false
    });
  }
  logActivity('Editó ítem',document.getElementById('e-code').value.trim());
  document.getElementById('modal-edit').classList.add('hidden');
  showToast('Cambios guardados');
}

function deleteAvio(secId,itemId,avioId){
  db.ref(`fabrica_v4/sections/${secId}/items/${itemId}/avios/${avioId}`).remove();
  showToast('Avío eliminado');
}

// SECTION MODAL
document.getElementById('add-sec-btn').onclick=()=>{document.getElementById('new-sec-name').value='';document.getElementById('modal-sec').classList.remove('hidden')};
document.getElementById('save-modal-sec').onclick=()=>{
  const name=document.getElementById('new-sec-name').value.trim();
  const color=document.getElementById('new-sec-color').value;
  if(!name)return;
  const maxOrder=Math.max(0,...Object.values(sectionsData).map(s=>s.order||0));
  db.ref('fabrica_v4/sections').push({title:name,color,order:maxOrder+1,collapsed:false,items:{}});
  document.getElementById('modal-sec').classList.add('hidden');
};

// NOTIFS
document.getElementById('notif-btn').onclick=()=>{document.getElementById('notif-panel').classList.toggle('hidden');renderNotifPanel()};
document.getElementById('mark-all-btn').onclick=()=>{
  Object.entries(actividadData).forEach(([id,a])=>{if(!a.read)db.ref(`fabrica_v4/actividad/${id}/read`).set(true)});
};
function markRead(id){db.ref(`fabrica_v4/actividad/${id}/read`).set(true)}

function renderNotifBadge(){
  const u=Object.values(actividadData).filter(a=>!a.read).length;
  const b=document.getElementById('notif-badge');
  if(u>0){b.textContent=u;b.classList.remove('hidden')}else b.classList.add('hidden');
}
function renderNotifPanel(){
  const list=document.getElementById('notif-list');
  const acts=Object.entries(actividadData).sort((a,b)=>b[1].timestamp-a[1].timestamp).slice(0,30);
  if(!acts.length){list.innerHTML='<div class="empty-state">Sin actividad</div>';return}
  list.innerHTML=acts.map(([id,a])=>`
    <div class="notif-item ${a.read?'':'unread'}">
      <div class="notif-dot ${a.read?'read':''}"></div>
      <div style="flex:1"><div class="notif-text"><strong>${a.user}</strong> — ${a.action}: ${a.details}</div>
      <div class="notif-time">${fmtTime(a.timestamp)}</div></div>
      ${!a.read?`<button class="notif-read-btn" onclick="markRead('${id}')">✓</button>`:''}
    </div>`).join('');
}
function renderActividad(){
  const c=document.getElementById('actividad-list');
  const acts=Object.entries(actividadData).sort((a,b)=>b[1].timestamp-a[1].timestamp);
  if(!acts.length){c.innerHTML='<div class="empty-state">Sin actividad registrada aún</div>';return}
  c.innerHTML=acts.map(([id,a])=>`
    <div class="notif-item ${a.read?'':'unread'}" style="border-radius:8px;margin-bottom:6px">
      <div class="notif-dot ${a.read?'read':''}"></div>
      <div style="flex:1"><div class="notif-text"><strong>${a.user}</strong> — ${a.action}: ${a.details}</div>
      <div class="notif-time">${fmtTime(a.timestamp)}</div></div>
      ${currentUser==='ariel'&&!a.read?`<button class="notif-read-btn" onclick="markRead('${id}')">✓ Leído</button>`:''}
    </div>`).join('');
}
function fmtTime(ts){
  if(!ts)return'';
  const d=new Date(ts);
  return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}

// TABS
document.getElementById('tab-btn-tablero').onclick=function(){
  document.getElementById('tab-tablero').classList.remove('hidden');
  document.getElementById('tab-actividad').classList.add('hidden');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  this.classList.add('active');
};
document.getElementById('tab-btn-actividad').onclick=function(){
  document.getElementById('tab-tablero').classList.add('hidden');
  document.getElementById('tab-actividad').classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  this.classList.add('active');renderActividad();
};

// MODAL CLOSE
document.getElementById('close-modal-edit').onclick=()=>document.getElementById('modal-edit').classList.add('hidden');
document.getElementById('cancel-modal-edit').onclick=()=>document.getElementById('modal-edit').classList.add('hidden');
document.getElementById('save-modal-edit').onclick=saveEditItem;
document.getElementById('close-modal-sec').onclick=()=>document.getElementById('modal-sec').classList.add('hidden');
document.getElementById('cancel-modal-sec').onclick=()=>document.getElementById('modal-sec').classList.add('hidden');
</script>
</body>
</html>
